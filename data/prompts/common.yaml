        - Examples 6-10 (Vacuum Suction Robot) use vacuum-specific functions (activate_vacuum, deactivate_vacuum, attach_vacuum_handle, detach_vacuum_handle) and are compatible ONLY with vacuum suction robots.

        You must use the appropriate functions based on the robot's end-effector type. Do not mix gripper and vacuum functions.

