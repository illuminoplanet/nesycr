        * Generated Code
        ```python
        # Assume the gripper is already holding the red block

        # Get the target box position and size
        box_pos = get_obj_pos("target_box")
        box_aabb = get_obj_bbox("target_box")

        # Compute a drop position slightly above the top of the box
        drop_height = box_aabb[1][2] + 0.02

        # Get red block size for grid calculation
        red_aabb = get_obj_bbox("red_block")
        red_size = red_aabb[1] - red_aabb[0]
        obj_w = float(red_size[0])
        half_w = obj_w / 2.0

        # Define grid positions to avoid stacking directly on blue block
        grid_positions = [
            (-half_w, -half_w),
            (half_w, -half_w),
            (-half_w, half_w),
            (half_w, half_w),
        ]

        # Select grid position based on object index
        cube_idx = 0  # Index for red_block
        grid_offset = grid_positions[cube_idx % 4]

        drop_pos = np.array([box_pos[0] + grid_offset[0], box_pos[1] + grid_offset[1], drop_height])

        # Move the gripper holding the block above the box
        move_to_position(pos=drop_pos, lift_clearance=0.15)

        # Release the block into the box
        open_gripper()
        ```

