        move_gripper_to(obj_name, depth=0.01)
        """
        Approach and align the gripper to the target object and move in by a small depth. Approach with lift clearance of 0.12m.

        Parameters:
            obj_name (str): Target object name
            depth (float): Penetration distance toward object along approach direction, set wisely from object size
        """

        move_parallel(move_dir, offset)
        """
        Translate the end-effector parallel to its current approach direction frame.

        Parameters:
            move_dir (str): One of ["left", "right", "up"]
            offset (float): Positive translation magnitude in meters
        """

        grasp_handle(handle_name)
        """
        Attempt to grasp a handle object; succeeds if the gripper is positioned within the handle's vicinity.

        Parameters:
            handle_name (str)
        Returns:
            bool: True if grasp activated, else False
        """

        release_handle()
        """
        Release the currently grasped handle and open the gripper.

        Returns:
            None
        """

        close_gripper()
        """
        Close the gripper with force control.
        """

        open_gripper()
        """
        Open the gripper fully.
        """

        attach_vacuum_handle(handle_name)
        """
        Attempt to attach vacuum to a handle object for vacuum suction robots; succeeds if the vacuum gripper is positioned within the handle's vicinity.
        This is the vacuum suction equivalent of grasp_handle().

        Parameters:
            handle_name (str)
        Returns:
            bool: True if attachment activated, else False
        """

        detach_vacuum_handle()
        """
        Detach the currently attached handle from vacuum suction and deactivate vacuum.
        This is the vacuum suction equivalent of release_handle().

        Returns:
            None
        """

        activate_vacuum()
        """
        Activate the vacuum suction to generate negative pressure for attachment.
        This is the vacuum suction equivalent of close_gripper().
        """

        deactivate_vacuum()
        """
        Deactivate the vacuum suction to stop generating negative pressure.
        This is the vacuum suction equivalent of open_gripper().
        """
        ```

        IMPORTANT: The robot's end-effector type (gripper or vacuum suction) must match the demonstrated examples.
