        Parameters:
            obj_name (str)
        Returns:
            bool
        """

        get_obj_names()
        """
        Get a list of all object names in the scene.

        Returns:
            List[str]
        """

        get_obj_pos(obj_name)
        """
        Get the current xyz position of an object (AABB center). For "floor", z is fixed to 0.50.
        Make sure to call this function each time right before you need the position, as the object may have moved.

        Parameters:
            obj_name (str)
        Returns:
            np.ndarray: [x, y, z]
        """

        get_obj_bbox(obj_name)
        """
        Get the axis-aligned bounding box (AABB) of an object.

        Parameters:
            obj_name (str)
        Returns:
            np.ndarray: shape (2, 3) -> [min_xyz, max_xyz]
        """

        get_obj_size(obj_name)
        """
        Get the size of an object (AABB dimensions).
        Parameters:
            obj_name (str)
        Returns:
            np.ndarray: shape (3,) -> [size_x, size_y, size_z]
        """

        obj_in_gripper(obj_name)
        """
        Check if the line segment between gripper fingers intersects the object's AABB.

        Parameters:
            obj_name (str)
        Returns:
            bool
        """

        gripper_is_open()
        """
        Check whether the gripper is currently open.

        Returns:
