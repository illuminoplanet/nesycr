predicates:
    partial: |
        (OverOf ?a ?b): ?a is horizontally aligned and vertically above ?b but not in contact.
        (OnTopOf ?a ?b): ?a is resting on and vertically supported by ?b.
        (InsideOf ?a ?b): ?a is contained in ?b.

        (GripperSurrounding ?x): ?x is enclosed between tip of two gripper fingers, but the gripper is not closed
        (GripperHolding ?x): the gripper is closed and holding ?x

    full: |
        (OverOf ?a ?b): ?a is horizontally aligned and vertically above ?b but not in contact.
        (OnTopOf ?a ?b): ?a is resting on and vertically supported by ?b.
        (InsideOf ?a ?b): ?a is contained in ?b (eg. an object inside a box/drawer).

        (Open ?x): ?x is in a fully-opened state (e.g., a drawer is fully pulled out, a hinge lid is fully open).
        (Closed ?x): ?x is in a fully-closed state (e.g., a drawer is fully pushed in, a hinge lid is fully shut).

        (GripperSurrounding ?x): ?x is enclosed between tip of two gripper fingers, but the gripper is not closed
        (GripperHolding ?x): the gripper is closed and holding ?x
        (GripperOpen): the gripper is open
        (GripperClosed): the gripper is closed

    extended: |
        (OverOf ?a ?b): ?a is horizontally aligned and vertically above ?b but not in contact.
        (OnTopOf ?a ?b): ?a is resting on and vertically supported by ?b.
        (InsideOf ?a ?b): ?a is contained in ?b (eg. an object inside a box/drawer).

        (Open ?x): ?x is in a fully-opened state (e.g., a drawer is fully pulled out, a hinge lid is fully open).
        (Closed ?x): ?x is in a fully-closed state (e.g., a drawer is fully pushed in, a hinge lid is fully shut).

        # Robot embodiement predicates
        (FingerGripper): The robot is a two-finger gripper robot for grasping objects, necessary precondition for finger gripper-specific predicates and actions.
        (VacuumSuction): The robot is a vacuum suction robot, necessary precondition for vacuum suction-specific predicates and actions.

        # Finger embodiement-specific predicates ((FingerGripper) must hold, can not be used with vacuum suction-specific predicates)
        (GripperSurrounding ?x): ?x is enclosed between tip of two gripper fingers, but the gripper is not closed
        (GripperHolding ?x): the gripper is closed and holding ?x
        (GripperOpen): the gripper is open
        (GripperClosed): the gripper is closed
    
        # Vacuum embodiement-specific predicates ((VacuumSuction) must hold, can not be used with finger gripper-specific predicates)
        (VacuumAligned ?x): ?x is positioned within reachable proximity, but vacuum is not yet active (similar function to GripperSurrounding)
        (VacuumAttached ?x): the vacuum suction is active and ?x is currently attached to it (similar function to GripperHolding)
        (VacuumActive): the vacuum suction is turned on, generating negative pressure for attachment (similar function to GripperClosed)
        (VacuumInactive): the vacuum suction is turned off, not generating suction (similar function to GripperOpen)

    end_effector: |
        (FingerGripper): The robot is a two-finger gripper robot for grasping objects, necessary precondition for finger gripper-specific predicates and actions.
        (VacuumSuction): The robot is a vacuum suction robot, necessary precondition for vacuum suction-specific predicates and actions.
        (GripperOpen): the gripper is open
        (GripperClosed): the gripper is closed
        (VacuumActive): the vacuum suction is turned on, generating negative pressure for attachment (similar function to GripperClosed)
        (VacuumInactive): the vacuum suction is turned off, not generating suction (similar function to GripperOpen)


