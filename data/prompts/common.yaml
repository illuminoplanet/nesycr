        ```python

        """Open the prismatic drawer"""
        # Move the gripper close to the drawer handle
        move_gripper_to("top_handle", depth=0)

        # Grasp to the handle for manipulation
        grasp_handle("top_handle")

        # Slide the drawer along its prismatic axis toward the open direction
        drawer_size = get_obj_size("top_drawer")
        move_amount = drawer_size[1] * 0.85  # reasonable travel to fully open

        # Determine the drawer open and close direction from relative position between drawer body and handle
        top_handle_pos = get_obj_pos("top_handle")
        drawer_body_pos = get_obj_pos("drawer_body")

        if top_handle_pos[1] > drawer_body_pos[1]:
            open_dir, close_dir = "right", "left" # drawer is facing right
        else:
            open_dir, close_dir = "left", "right" # drawer is facing left

        move_parallel(move_dir=open_dir, offset=move_amount)

        # Release the holding handle
        release_handle()

        """Close the prismatic drawer"""
        # Move the gripper close to the drawer handle
        move_gripper_to("top_handle", depth=0)

        # Grasp to the handle for manipulation
        grasp_handle("top_handle")

        # Slide the drawer along its prismatic axis toward the closed direction
        drawer_size = get_obj_size("top_drawer")
        move_amount = drawer_size[1] * 0.8  # reasonable travel to fully close
        move_parallel(move_dir=close_dir, offset=move_amount) 

        # Release the holding handle
        release_handle()
        ```

