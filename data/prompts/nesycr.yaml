        You can use a forall quantifier in preconditions/effects, e.g.:
        - (forall (?x - thing) (not (Holding ?x)))

        Now produce your refinement patch for the information below.

        # Task Information
        - Instruction
        {instruction}

        - Objects in scene
        {objects}

        # Action Information
